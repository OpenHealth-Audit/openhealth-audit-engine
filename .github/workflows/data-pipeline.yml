name: OpenHealth Omni-Scraper Pipeline

on:
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: 
    

permissions:
  contents: write 

jobs:
  update-data-lake:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Zero-Hardcode Scraper
        run: python update_data.py

      - name: Commit and Push Updated Data Lake
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supplemental.json
          # Only commit if the data has actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 GitOps: Automated Monthly Data Lake Update"
          git push